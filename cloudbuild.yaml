steps:
  # Pull latest image to use as cache
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/energy-tracker:latest || true']

  # Build the Docker image using cache from latest
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/energy-tracker:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/energy-tracker:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/energy-tracker:latest'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/energy-tracker'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'energy-tracker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/energy-tracker:$COMMIT_SHA'
      - '--region'
      - 'australia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--set-secrets'
      - 'ANTHROPIC_API_KEY=anthropic-api-key:latest,JWT_SECRET_KEY=jwt-secret-key:latest,REGISTRATION_SECRET=registration-secret:latest'

images:
  - 'gcr.io/$PROJECT_ID/energy-tracker'

options:
  logging: CLOUD_LOGGING_ONLY
